server {
    listen 80;
    server_name victorinox.example.com;

    location /victorinox/ {
        proxy_pass http://127.0.0.1:8000/; # This trailing slash will strip the location's /victorinox/ so gunicorn doesn't explode
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }
}
